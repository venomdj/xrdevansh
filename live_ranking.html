<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Ranking Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Broadcast-accurate color system =====
   Title  : #4F79C9
   Header : #111111
   Row A  : #9096AD
   Row B  : #7F8088
   Miss   : darker grey, MISS label
*/
html,body{
  margin:0;padding:0;background:transparent;
  font-family:'Oswald',sans-serif;
  overflow:hidden;
}
#stage{
  width:340px;
  margin:10px;
  box-sizing:border-box;
}
.title-bar{
  width:100%;
  height:36px;
  background:#4F79C9;
  display:flex;
  align-items:center;
  justify-content:center;
}
.title-bar span{
  font-family:'Oswald',sans-serif;
  font-weight:700;
  font-size:26px;
  letter-spacing:1px;
  color:#000000;
  text-transform:uppercase;
}
.head{
  width:100%;
  height:26px;
  background:#111111;
  display:grid;
  grid-template-columns:16% 40% 14% 18% 12%;
  align-items:center;
}
.head div{
  color:#ffffff;
  font-weight:700;
  font-size:12px;
  letter-spacing:0.5px;
  text-transform:uppercase;
}
.head .c-rank{text-align:center;}
.head .c-team{text-align:left; padding-left:6px;}
.head .c-pts{text-align:center;}
.head .c-alive{text-align:center;}
.head .c-elims{text-align:center;}
#rows{position:relative;}
.row{
  position:absolute;
  left:0;right:0;
  height:31px;
  display:grid;
  grid-template-columns:16% 40% 14% 18% 12%;
  align-items:center;
  box-sizing:border-box;
  transition:top .5s cubic-bezier(.4,0,.2,1), background .3s ease;
}
.row .c-rank{
  text-align:center; color:#ffffff; font-weight:700; font-size:15px;
}
.row .c-team{
  display:flex; align-items:center; gap:7px; padding-left:6px; min-width:0;
}
.row .c-pts{
  text-align:right; padding-right:8px; color:#ffffff; font-weight:700; font-size:15px;
}
.row .c-alive{ display:flex; align-items:center; justify-content:center; gap:3px; }
.row .c-elims{ text-align:center; color:#ffffff; font-weight:700; font-size:15px; }
.team-logo{
  flex-shrink:0;width:19px;height:19px;
  object-fit:contain;
}
.team-name{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
  color:#ffffff;
  font-weight:700;
  font-size:14px;
  text-transform:uppercase;
}
.status-bar{
  display:inline-block;
  width:7px;height:20px;
  border-radius:3.5px;
}
.miss-label{
  letter-spacing:2px; font-weight:700; font-size:12px; color:#c9c9c9; text-transform:uppercase;
}
/* Eliminated / MISS row look */
.row.eliminated .team-logo{ opacity:.45; }
.row.eliminated .team-name{ color:#8a8a8a; }
.row.eliminated .c-rank{ color:#8a8a8a; }
.row.eliminated .c-pts{ color:#8a8a8a; }
.row.eliminated .c-elims{ color:#8a8a8a; }
.empty{
  padding:16px 10px;text-align:center;color:#8fa3ad;
  font-size:12px;background:#101820;font-weight:600;
}
</style>
</head>
<body>
<div id="stage">
<div class="title-bar"><span>LIVE RANKING</span></div>
<div class="head">
<div class="c-rank">RANK</div><div class="c-team">TEAM</div><div class="c-pts">PTS</div><div class="c-alive">ALIVE</div><div class="c-elims">ELIMS</div>
</div>
<div id="rows">
<div class="empty" id="emptyMsg" style="display:none;">Waiting for data&hellip;</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const ROW_H = 31;
const STATUS_COLOR = { eliminated: '#000000', knocked: '#FF1A1A', alive: '#ffffff' };
const ROW_COLORS = ['#9096AD', '#7F8088'];
const rowsEl = document.getElementById('rows');
const emptyMsg = document.getElementById('emptyMsg');
let prevTotals = {};

function statusBarsHtml(alive, knocked) {
  const total = 4;
  const eliminated = Math.max(0, total - alive - knocked);
  const bars = [];
  for (let i = 0; i < alive; i++) bars.push(STATUS_COLOR.alive);
  for (let i = 0; i < knocked; i++) bars.push(STATUS_COLOR.knocked);
  for (let i = 0; i < eliminated; i++) bars.push(STATUS_COLOR.eliminated);
  return bars.slice(0, total).map(c =>
    `<span class="status-bar" style="background:${c}"></span>`
  ).join('');
}

function fillRow(el, t, i) {
  const isMiss = t.alive <= 0;
  el.style.background = ROW_COLORS[i % 2];
  el.classList.toggle('eliminated', isMiss);
  const logoHtml = t.logo
    ? `<img class="team-logo" src="${t.logo}" alt="">`
    : `<span class="team-logo"></span>`;
  const aliveHtml = isMiss
    ? `<span class="miss-label">MISS</span>`
    : statusBarsHtml(t.alive, t.knocked || 0);
  el.innerHTML = `
    <span class="c-rank">#${i + 1}</span>
    <span class="c-team">${logoHtml}<span class="team-name">${escapeHtml(t.name)}</span></span>
    <span class="c-pts">${t.total}</span>
    <span class="c-alive">${aliveHtml}</span>
    <span class="c-elims">${t.kills}</span>
  `;
  fitTeamName(el.querySelector('.team-name'));
}

function fitTeamName(nameEl) {
  if (!nameEl) return;
  const maxSize = 14, minSize = 11;
  let size = maxSize;
  nameEl.style.fontSize = size + 'px';
  requestAnimationFrame(() => {
    while (nameEl.scrollWidth > nameEl.clientWidth && size > minSize) {
      size -= 0.5;
      nameEl.style.fontSize = size + 'px';
    }
  });
}

function renderTeams(teams) {
  emptyMsg.style.display = 'none';
  teams.sort((a, b) => b.total - a.total || b.kills - a.kills);
  rowsEl.style.height = (teams.length * ROW_H) + 'px';

  const seenKeys = new Set();
  teams.forEach((t, i) => {
    seenKeys.add(t.key);
    let el = rowsEl.querySelector(`[data-key="${t.key}"]`);
    const isNew = !el;
    if (isNew) {
      el = document.createElement('div');
      el.className = 'row';
      el.dataset.key = t.key;
      el.style.top = (i * ROW_H) + 'px';
      rowsEl.appendChild(el);
    } else {
      el.style.top = (i * ROW_H) + 'px';
    }
    fillRow(el, t, i);
    prevTotals[t.key] = t.total;
  });

  rowsEl.querySelectorAll('.row').forEach(el => {
    if (!seenKeys.has(el.dataset.key)) el.remove();
  });
}

function showEmpty(msg) {
  rowsEl.querySelectorAll('.row').forEach(el => el.remove());
  rowsEl.style.height = 'auto';
  emptyMsg.textContent = msg;
  emptyMsg.style.display = 'block';
}

const { tid, rid, mid, setId } = getUrlIds();

if (!tid || !rid || !mid || !setId) {
  showEmpty('Missing tid / rid / mid / setId in URL');
} else {
  metaRef(tid, rid, mid, setId).on('value', snap => {
    const meta = snap.val();
  });

  teamsRef(tid, rid, mid, setId).on('value', snap => {
    const val = snap.val();
    if (!val) {
      showEmpty('No teams yet');
      return;
    }
    const teams = Object.entries(val).map(([key, t]) => {
      const alive = Number(t.alive ?? 0);
      const kills = Number(t.kills ?? 0);
      const knocked = Number(t.knocked ?? 0);
      const placementPoints = Number(t.placementPoints ?? 0);
      return {
        key,
        name: t.name || 'TEAM',
        logo: t.logo || '',
        alive,
        knocked,
        kills,
        total: placementPoints + kills
      };
    });
    renderTeams(teams);
  }, err => {
    showEmpty(`DB error: ${err.message}`);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
</script>
</body>
</html>
