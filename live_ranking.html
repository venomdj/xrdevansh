<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Ranking Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ===== BGMI esports color system =====
   Header/footer : teal-cyan gradient
   #1 row        : gold/yellow
   #2 row        : copper/orange
   #3+ rows      : alternating dark navy
   Eliminated    : desaturated/dimmed
*/
html,body{
  margin:0;padding:0;background:transparent;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#stage{
  width:250px;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.45);
}
.head{
  display:grid;
  grid-template-columns:20px 1fr 58px 22px 30px;
  align-items:center;
  background:linear-gradient(90deg,#0f2a3a,#123b4f 60%,#146277);
  border-bottom:2px solid #0a4a5c;
  padding:6px 6px;
}
.head div{
  color:#8fe9ef;
  font-weight:700;
  letter-spacing:0.6px;
}
.head div:first-child{font-size:12px; color:#ffd23f;}
.head div:nth-child(2){font-size:12px; color:#ffffff;}
.head div:nth-child(3){font-size:11px; padding-left:6px;}
.head div:nth-child(4),.head div:nth-child(5){font-size:11px;}
#rows{position:relative;}
.row{
  position:absolute;
  left:0;right:0;
  height:34px;
  display:grid;
  grid-template-columns:20px 1fr 58px 22px 30px;
  gap:4px;
  align-items:center;
  padding:0 6px;
  border-bottom:1px solid rgba(0,0,0,.35);
  box-sizing:border-box;
  transition:top .5s cubic-bezier(.4,0,.2,1), background .3s ease;
}
.row.eliminated{ filter:grayscale(.6) brightness(.55); }
.row{ position:absolute; will-change:top; }
.row.pulse{ animation:rowGlow 1.1s ease-out; }
@keyframes rowGlow{
  0%   { box-shadow:0 0 0 0 rgba(23,201,209,0); filter:brightness(1); }
  15%  { box-shadow:0 0 14px 3px rgba(23,201,209,.55); filter:brightness(1.18); }
  100% { box-shadow:0 0 0 0 rgba(23,201,209,0); filter:brightness(1); }
}
.row .shimmer{
  position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(100deg, transparent 20%, rgba(255,255,255,.35) 45%, transparent 65%);
  transform:translateX(-120%);
  mix-blend-mode:overlay;
}
.row.pulse .shimmer{ animation:shimmerSweep .9s ease-out; }
@keyframes shimmerSweep{
  0%   { transform:translateX(-120%); opacity:1; }
  100% { transform:translateX(120%); opacity:0; }
}
.pts-cell{ transition:transform .25s ease; display:flex; align-items:center; justify-content:center; }
.pts-cell.bump{ animation:ptsBump .5s ease-out; }
@keyframes ptsBump{
  0%   { transform:scale(1); }
  35%  { transform:scale(1.35); }
  100% { transform:scale(1); }
}
.rank-badge{
  width:20px;height:20px;
  font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;
}
.team-cell{
  display:flex;align-items:center;gap:6px;
  font-weight:700;font-size:13px;
  min-width:0;
}
.team-name{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
  font-weight:600;
  letter-spacing:0.2px;
  text-shadow:0 1px 2px rgba(0,0,0,.55);
  -webkit-font-smoothing:antialiased;
}
.team-logo{
  flex-shrink:0;width:18px;height:18px;
  border-radius:2px;object-fit:contain;
  background:rgba(255,255,255,.15);
}
.status-bar{display:inline-block;width:6px;height:12px;border-radius:1px;margin-right:2px;}
.status-cell{ padding-left:6px; display:flex; }
.fin-cell{text-align:center;font-weight:700;font-size:13px;}
.pts-cell{text-align:center;font-weight:700;font-size:16px;}
.foot{
  display:flex;gap:8px;justify-content:center;align-items:center;
  background:linear-gradient(90deg,#146277,#123b4f 60%,#0f2a3a);
  border-top:2px solid #0a4a5c;
  padding:6px 0;
}
.legend-item{
  display:flex;align-items:center;gap:3px;
  font-size:9px;color:#e7fbfc;font-weight:700;
}
.legend-chip{display:inline-block;width:9px;height:9px;border-radius:1px;}
.empty{
  padding:16px 10px;text-align:center;color:#8fa3ad;
  font-size:12px;background:#101820;font-weight:600;
}
</style>
</head>
<body>
<div id="stage">
<div class="head">
<div>#</div><div>TEAMS</div><div>STATUS</div><div>FIN</div><div>PTS</div>
</div>
<div id="rows">
<div class="empty" id="emptyMsg" style="display:none;">Waiting for data&hellip;</div>
</div>
<div class="foot">
<span class="legend-item"><i class="legend-chip" style="background:#33c766"></i>ALIVE</span>
<span class="legend-item"><i class="legend-chip" style="background:#f2994a"></i>KNOCKED</span>
<span class="legend-item"><i class="legend-chip" style="background:#4a4a4a"></i>ELIMINATED</span>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const ROW_H = 34;
const STATUS_COLOR = { eliminated: '#4a4a4a', knocked: '#f2994a', alive: '#33c766' };
const rowsEl = document.getElementById('rows');
const emptyMsg = document.getElementById('emptyMsg');
let prevTotals = {};

/* Rank-based row theming — BGMI esports style medal set:
   #1 gold, #2 silver, #3 bronze, #4+ alternating dark navy */
function rowStyle(i) {
  if (i === 0) return { bg: 'linear-gradient(90deg,#3a2f06,#5c4a0a 40%,#2a2204)', accentBg: '#ffd23f', ptsColor: '#ffd23f', txt: '#fff7d6', badgeTxt: '#241c02' };
  if (i === 1) return { bg: 'linear-gradient(90deg,#2b2f33,#454b50 40%,#202325)', accentBg: '#d7dee3', ptsColor: '#d7dee3', txt: '#f2f5f7', badgeTxt: '#1b1e20' };
  if (i === 2) return { bg: 'linear-gradient(90deg,#3a2412,#6b4520 40%,#2a1a0d)', accentBg: '#cd7f32', ptsColor: '#e3995a', txt: '#ffe4c9', badgeTxt: '#291609' };
  return i % 2 === 0
    ? { bg: '#141c24', accentBg: '#17c9d1', ptsColor: '#ffb02e', txt: '#eef2f6', badgeTxt: '#04191b' }
    : { bg: '#1a232c', accentBg: '#17c9d1', ptsColor: '#ffb02e', txt: '#eef2f6', badgeTxt: '#04191b' };
}

function statusBarsHtml(alive, knocked) {
  const total = 4;
  const eliminated = Math.max(0, total - alive - knocked);
  const bars = [];
  for (let i = 0; i < alive; i++) bars.push(STATUS_COLOR.alive);
  for (let i = 0; i < knocked; i++) bars.push(STATUS_COLOR.knocked);
  for (let i = 0; i < eliminated; i++) bars.push(STATUS_COLOR.eliminated);
  return bars.slice(0, total).map(c =>
    `<span class="status-bar" style="background:${c}"></span>`
  ).join('');
}

function fillRow(el, t, i) {
  const s = rowStyle(i);
  el.style.background = s.bg;
  el.style.color = s.txt;
  el.classList.toggle('eliminated', t.alive <= 0);
  const logoHtml = t.logo
    ? `<img class="team-logo" src="${t.logo}" alt="">`
    : `<span class="team-logo"></span>`;
  el.innerHTML = `
    <span class="rank-badge" style="background:${s.accentBg};color:${s.badgeTxt}">${i + 1}</span>
    <span class="team-cell">${logoHtml}<span class="team-name">${escapeHtml(t.name)}</span></span>
    <span class="status-cell">${statusBarsHtml(t.alive, t.knocked || 0)}</span>
    <span class="fin-cell">${t.kills}</span>
    <span class="pts-cell" style="color:${s.ptsColor}">${t.total}</span>
    <span class="shimmer"></span>
  `;
  fitTeamName(el.querySelector('.team-name'));
}

// Shrinks the team-name font-size (down to a floor) until it fits its
// available width, so long clan tags like "LORDS OFFICIAL" scale down
// instead of getting hard-clipped.
function fitTeamName(nameEl) {
  if (!nameEl) return;
  const maxSize = 14, minSize = 11;
  let size = maxSize;
  nameEl.style.fontSize = size + 'px';
  // requestAnimationFrame ensures layout is settled before measuring
  requestAnimationFrame(() => {
    while (nameEl.scrollWidth > nameEl.clientWidth && size > minSize) {
      size -= 0.5;
      nameEl.style.fontSize = size + 'px';
    }
  });
}

function easeOutCubic(p) { return 1 - Math.pow(1 - p, 3); }

function flashRow(el, oldTotal, newTotal) {
  // gentle glow + shimmer sweep across the row
  el.classList.remove('pulse'); void el.offsetWidth; // restart animation
  el.classList.add('pulse');
  setTimeout(() => el.classList.remove('pulse'), 1100);

  const ptsEl = el.querySelector('.pts-cell');
  ptsEl.classList.remove('bump'); void ptsEl.offsetWidth;
  ptsEl.classList.add('bump');
  setTimeout(() => ptsEl.classList.remove('bump'), 500);

  let start = null;
  const duration = 650;
  function step(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / duration, 1);
    const eased = easeOutCubic(p);
    ptsEl.textContent = Math.round(oldTotal + (newTotal - oldTotal) * eased);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderTeams(teams) {
  emptyMsg.style.display = 'none';
  teams.sort((a, b) => b.total - a.total || b.kills - a.kills);
  rowsEl.style.height = (teams.length * ROW_H) + 'px';

  const seenKeys = new Set();
  teams.forEach((t, i) => {
    seenKeys.add(t.key);
    let el = rowsEl.querySelector(`[data-key="${t.key}"]`);
    const isNew = !el;
    if (isNew) {
      el = document.createElement('div');
      el.className = 'row';
      el.dataset.key = t.key;
      el.style.top = (i * ROW_H) + 'px';
      rowsEl.appendChild(el);
    } else {
      el.style.top = (i * ROW_H) + 'px';
    }
    fillRow(el, t, i);

    const old = prevTotals[t.key];
    if (!isNew && old !== undefined && old !== t.total) {
      flashRow(el, old, t.total);
    }
    prevTotals[t.key] = t.total;
  });

  rowsEl.querySelectorAll('.row').forEach(el => {
    if (!seenKeys.has(el.dataset.key)) el.remove();
  });
}

function showEmpty(msg) {
  rowsEl.querySelectorAll('.row').forEach(el => el.remove());
  rowsEl.style.height = 'auto';
  emptyMsg.textContent = msg;
  emptyMsg.style.display = 'block';
}

const { tid, rid, mid, setId } = getUrlIds();

if (!tid || !rid || !mid || !setId) {
  showEmpty('Missing tid / rid / mid / setId in URL');
} else {
  metaRef(tid, rid, mid, setId).on('value', snap => {
    const meta = snap.val();
    // match label available at meta.matchLabel if you want to surface it
    // in a header badge later; header currently mirrors the reference design.
  });

  teamsRef(tid, rid, mid, setId).on('value', snap => {
    const val = snap.val();
    if (!val) {
      showEmpty('No teams yet');
      return;
    }
    const teams = Object.entries(val).map(([key, t]) => {
      const alive = Number(t.alive ?? 0);
      const kills = Number(t.kills ?? 0);
      const knocked = Number(t.knocked ?? 0);
      const placementPoints = Number(t.placementPoints ?? 0);
      return {
        key,
        name: t.name || 'TEAM',
        logo: t.logo || '',
        alive,
        knocked,
        kills,
        total: placementPoints + kills
      };
    });
    renderTeams(teams);
  }, err => {
    showEmpty(`DB error: ${err.message}`);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
</script>
</body>
</html>
